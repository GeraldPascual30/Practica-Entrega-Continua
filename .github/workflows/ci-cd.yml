name: CI/CD Docker + Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: geraldpascual30/mi-monitoreo-app

jobs:
  build-and-push:
    name: Build and push image to Docker Hub
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar etiquetas de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Construir y subir imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Disparar deploy hook de Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
