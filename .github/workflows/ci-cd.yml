name: CI/CD Docker + Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: geraldpascual30/practica-entrega-continua

jobs:
  build-and-push:
    name: Build and push image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Verificar Render secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL VACIO"
            exit 1
          fi

          case "$RENDER_DEPLOY_HOOK_URL" in
            https://*)
              echo "Render secret OK"
              ;;
            *)
              echo "RENDER_DEPLOY_HOOK_URL no parece una URL valida"
              exit 1
              ;;
          esac

      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
